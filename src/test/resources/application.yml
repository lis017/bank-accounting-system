spring:
  profiles:
    active: test
  datasource:
    url: jdbc:h2:mem:bankaccounting;MODE=MySQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    open-in-view: false

  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false

logging:
  level:
    root: WARN
    com.kakaobank.accounting: INFO
